<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - My Portfolio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: white;
      color: black;
    }

    .dark-mode {
      background-color: #121212;
      color: white;
    }

    .dark-mode .navbar {
      background-color: black;
    }

    .dark-mode .nav-links li a {
      color: white;
    }

    .dark-mode .logo {
      color: #facc15;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #1e3a8a;
      padding: 15px 40px;
    }

    .logo {
      color: white;
      font-size: 24px;
      font-weight: bold;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 25px;
    }

    .nav-links li a {
      text-decoration: none;
      color: white;
      font-size: 18px;
      transition: 0.3s;
    }

    .nav-links li a:hover {
      color: #facc15;
    }

    .dark-mode-btn {
      background-color: #facc15;
      color: black;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .dark-mode-btn:hover {
      background-color: #eab308;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 50px;
      flex-wrap: wrap;
    }

    .hero-text {
      width: 50%;
    }

    .hero-text h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .hero-text h2 {
      color: #1e3a8a;
      margin: 10px 0;
      min-height: 35px;
    }

    .hero-text p {
      margin: 15px 0;
      font-size: 18px;
      line-height: 1.6;
    }

    .name {
      color: #1e3a8a;
    }

    .btn {
      display: inline-block;
      margin: 10px 10px 0 0;
      padding: 10px 18px;
      background-color: #1e3a8a;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      transition: 0.3s;
    }

    .btn:hover {
      background-color: #3749a5;
    }

    .hero-img img {
      width: 250px;
      height: 250px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid #1e3a8a;
    }

    .calculator {
      padding: 40px;
      text-align: center;
    }

    .calculator h2 {
      margin-bottom: 20px;
      color: #1e3a8a;
    }

    .calculator input {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 250px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .calculator button {
      padding: 10px 20px;
      background-color: #1e3a8a;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }

    .calculator button:hover {
      background-color: #3749a5;
    }

    #result {
      margin-top: 20px;
    }

    @media (max-width: 768px) {
      .navbar {
        flex-direction: column;
        gap: 15px;
      }

      .nav-links {
        flex-direction: column;
        text-align: center;
      }

      .hero {
        flex-direction: column;
        text-align: center;
      }

      .hero-text {
        width: 100%;
        margin-bottom: 30px;
      }
    }
  </style>
</head>
<script src="script.js"></script>
<body>

  <nav class="navbar">
    <div class="logo">MyPortfolio</div>

    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>

    <button class="dark-mode-btn" onclick="toggleDarkMode()">Dark Mode</button>
  </nav>

  <section class="hero">
    <div class="hero-text">
      <h1>Hello, I am <span class="name">Aagya Jain</span></h1>
      <h2 id="typing"></h2>
      <p>
        I am a first-year engineering student passionate about web development,
        design, and building creative projects.
      </p>

      <a href="projects.html" class="btn">View Projects</a>
      <a href="resume.pdf" download class="btn">Download Resume</a>
    </div>

    <div class="hero-img">
      <img src="image.png" alt="Profile Image">
    </div>
  </section>

  <section class="calculator">
    <h2>GPA / Percentage Calculator</h2>
    <input type="number" id="m1" placeholder="Subject 1 Marks" min="0" max="100">
    <input type="number" id="m2" placeholder="Subject 2 Marks" min="0" max="100">
    <input type="number" id="m3" placeholder="Subject 3 Marks" min="0" max="100">
    <input type="number" id="m4" placeholder="Subject 4 Marks" min="0" max="100">
    <input type="number" id="m5" placeholder="Subject 5 Marks" min="0" max="100">


    <button onclick="calculateGPA()">Calculate</button>

    <h3 id="result"></h3>
  </section>
</body>
</html>
